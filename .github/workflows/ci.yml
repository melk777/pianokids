name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Configuração para forçar Node.js 24 em todas as ações
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      # Variáveis do Supabase (Essenciais para o Build)
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      
      # Outras variáveis de ambiente
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_MONTHLY_PRICE_ID: ${{ secrets.STRIPE_MONTHLY_PRICE_ID }}
      STRIPE_YEARLY_PRICE_ID: ${{ secrets.STRIPE_YEARLY_PRICE_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Instalar Dependências
        run: npm ci || npm install
      - name: Validar Configuração de Segredos
        run: |
          echo "Verificando presença de variáveis críticas (sem mostrar valores)..."
          [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && echo "✅ NEXT_PUBLIC_SUPABASE_URL presente" || echo "❌ NEXT_PUBLIC_SUPABASE_URL ausente"
          [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && echo "✅ NEXT_PUBLIC_SUPABASE_ANON_KEY presente" || echo "❌ NEXT_PUBLIC_SUPABASE_ANON_KEY ausente"
          [ -n "$STRIPE_SECRET_KEY" ] && echo "✅ STRIPE_SECRET_KEY presente" || echo "❌ STRIPE_SECRET_KEY ausente"
          
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "ERRO: Variáveis essenciais do Supabase não encontradas nos GitHub Secrets."
            exit 1
          fi
      - name: Checagem de Tipos (TypeScript)
        run: npx tsc --noEmit
      - name: Build de Produção (Next.js)
        run: npm run build